name: Release Official

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0). Leave empty to use version from tauri.conf.json.'
        required: false
        default: ''
      release_notes:
        description: 'Custom release notes (optional). Prepended before the changelog.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pre.outputs.tag }}
      sha: ${{ steps.pre.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      # Guard against shipping a bogus tag. Resolve in the same
      # priority order as begin-release (input → tag-ref → file)
      # and require strict semver. Aborts BEFORE the draft is
      # created so no cleanup is needed.
      #
      # Why this exists (2026-05-10): the old expression
      # `inputs.tag || github.ref_name` resolved to "main" on a
      # workflow_dispatch from the default branch and produced a
      # `vmain` release on display-dj. This guard + the safer
      # `version:` expression below close that bug for good.
      - name: Validate resolved tag (fail fast)
        run: |
          set -euo pipefail
          INPUT_TAG="${{ inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            CANDIDATE="${INPUT_TAG#v}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            CANDIDATE="${GITHUB_REF#refs/tags/v}"
          else
            CANDIDATE=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf-8')).version)")
          fi
          if [[ ! "$CANDIDATE" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.]+)?$ ]]; then
            {
              echo "::error::Resolved tag 'v${CANDIDATE}' is not strict semver."
              echo "::error::Source priority: inputs.tag → refs/tags/v* → src-tauri/tauri.conf.json#version."
              echo "::error::Fix one of those before re-running."
              echo "::error::Guard added 2026-05-10 after a 'vmain' release was produced by an unguarded fallback to github.ref_name."
            } >&2
            exit 1
          fi
          echo "Tag candidate valid: v${CANDIDATE}"

      - uses: synle/workflows/actions/release/begin-release@main
        id: pre
        with:
          mode: official
          project_name: Tauri Desktop Shell Sidecar Template
          # Resolution order: explicit input → tag-ref push → version_file.
          # We DO NOT fall back to github.ref_name unconditionally.
          # On a workflow_dispatch from main (no tag input) that
          # resolved to "main" and produced a `vmain` release on
          # 2026-05-10. The guard step above enforces this too.
          version: ${{ inputs.tag || (startsWith(github.ref, 'refs/tags/v') && github.ref_name || '') }}
          version_file: src-tauri/tauri.conf.json

  build:
    needs: [prepare]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_RELEASE: 'true'
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'Tauri Desktop Shell Sidecar Template ${{ needs.prepare.outputs.tag }}'
          releaseBody: 'Build in progress...'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  release:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: synle/workflows/actions/release/end-release@main
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          project_name: Tauri Desktop Shell Sidecar Template
          mode: official
          build_result: ${{ needs.build.result }}
          sha: ${{ needs.prepare.outputs.sha }}
          user_notes: ${{ inputs.release_notes }}
