name: Release Beta

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to build from. Leave empty to use HEAD.'
        required: false
        default: ''
      notes:
        description: 'Custom release notes (optional). Prepended before the changelog.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pre.outputs.tag }}
      sha: ${{ steps.pre.outputs.sha }}
    steps:
      - uses: synle/workflows/actions/release/begin-release@main
        id: pre
        with:
          mode: beta
          project_name: Tauri Desktop Shell Sidecar Template Beta
          sha: ${{ inputs.sha }}

  build:
    needs: [prepare]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'Tauri Desktop Shell Sidecar Template Beta (${{ needs.prepare.outputs.tag }})'
          releaseBody: 'Build in progress...'
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}

  release:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: synle/workflows/actions/release/end-release@main
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          project_name: Tauri Desktop Shell Sidecar Template Beta
          mode: beta
          build_result: ${{ needs.build.result }}
          sha: ${{ needs.prepare.outputs.sha }}
          user_notes: ${{ inputs.notes }}
